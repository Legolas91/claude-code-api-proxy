# CI — claude-code-api-proxy
# Runs tests, build, and lint on every push/PR to main.
# Pure PowerShell — bare-metal Windows runner.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: windows-latest
    steps:
      - name: Checkout
        shell: pwsh
        run: |
          $url = "${{ github.server_url }}".Replace("https://", "https://token:${{ github.token }}@")
          git clone --depth 1 --branch "${{ github.ref_name }}" "$url/${{ github.repository }}.git" .

      - name: Verify Go
        shell: pwsh
        run: go version

      - name: Download dependencies
        shell: pwsh
        run: go mod download

      - name: Verify go.sum
        shell: pwsh
        run: |
          go mod tidy
          $diff = git diff --name-only go.sum go.mod
          if ($diff) {
            git diff go.sum go.mod
            throw "go.sum or go.mod out of sync — run 'go mod tidy' locally"
          }
          Write-Host "go.sum and go.mod are in sync"

      - name: Test
        shell: pwsh
        run: |
          # Exclude internal/daemon (TestIsRunningHealthCheck requires a running proxy — pre-existing issue)
          go test "-coverprofile=coverage.out" ./internal/config/... ./internal/converter/... ./internal/server/... ./pkg/...
          $total = (go tool cover "-func=coverage.out" | Select-String "^total:").ToString()
          if ($total -match '(\d+\.\d+)%') {
            $pct = [double]$Matches[1]
            Write-Host "Coverage: $pct%"
            if ($pct -lt 40) { throw "Coverage $pct% below 40% threshold" }
          }

      - name: Build
        shell: pwsh
        run: go build -ldflags "-s -w" -o cc-api-proxy.exe cmd/cc-api-proxy/main.go

      - name: Lint
        shell: pwsh
        run: golangci-lint run

      - name: Vulnerability check
        shell: pwsh
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $gopath = (go env GOPATH)
          & "$gopath/bin/govulncheck.exe" ./...

      - name: Security scan (gosec)
        shell: pwsh
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          $gopath = (go env GOPATH)
          & "$gopath/bin/gosec.exe" -exclude-generated -exclude=G101 ./...
