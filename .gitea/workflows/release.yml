# Release — claude-code-api-proxy
# Builds cross-platform binaries and creates a Gitea release on tag push.
# Pure PowerShell — bare-metal Windows runner.

name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        shell: pwsh
        run: |
          $url = "${{ github.server_url }}".Replace("https://", "https://token:${{ github.token }}@")
          git clone --depth 1 --branch "${{ github.ref_name }}" "$url/${{ github.repository }}.git" .

      - name: Verify Go
        shell: pwsh
        run: go version

      - name: Extract version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          echo "VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Building version: $version"

      - name: Download dependencies
        shell: pwsh
        run: go mod download

      - name: Test
        shell: pwsh
        run: |
          # Exclude internal/daemon (TestIsRunningHealthCheck requires a running proxy)
          go test -v ./internal/config/... ./internal/converter/... ./internal/server/... ./pkg/...

      - name: Build cross-platform
        shell: pwsh
        run: |
          $version = $env:VERSION
          $commit = (git rev-parse --short HEAD 2>$null)
          $binary = "cc-api-proxy"
          $versionPkg = "github.com/claude-code-proxy/proxy/internal/version"
          $ldflags = "-s -w -X ${versionPkg}.Version=${version} -X ${versionPkg}.Commit=${commit}"

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $targets = @(
            @{ GOOS="darwin";  GOARCH="arm64"; Suffix="-darwin-arm64" },
            @{ GOOS="darwin";  GOARCH="amd64"; Suffix="-darwin-amd64" },
            @{ GOOS="linux";   GOARCH="amd64"; Suffix="-linux-amd64" },
            @{ GOOS="linux";   GOARCH="arm64"; Suffix="-linux-arm64" },
            @{ GOOS="windows"; GOARCH="amd64"; Suffix="-windows-amd64.exe" }
          )

          foreach ($t in $targets) {
            $out = "dist/${binary}$($t.Suffix)"
            Write-Host "Building $($t.GOOS)/$($t.GOARCH)..."
            $env:GOOS = $t.GOOS
            $env:GOARCH = $t.GOARCH
            go build -ldflags $ldflags -o $out "cmd/${binary}/main.go"
            if ($LASTEXITCODE -ne 0) { throw "Build failed for $($t.GOOS)/$($t.GOARCH)" }
          }

          # Reset to host values
          Remove-Item env:GOOS -ErrorAction SilentlyContinue
          Remove-Item env:GOARCH -ErrorAction SilentlyContinue

          Get-ChildItem dist/ | Format-Table Name, Length

      - name: Smoke test Windows binary
        shell: pwsh
        run: |
          $version = $env:VERSION
          $binary = "dist/cc-api-proxy-windows-amd64.exe"
          $pass = 0; $fail = 0

          function Assert-Pass($label) { Write-Host "  PASS $label"; $script:pass++ }
          function Assert-Fail($label, $detail) { Write-Host "  FAIL $label — $detail"; $script:fail++ }

          # 1. version command
          $out = & $binary version 2>&1
          if ($LASTEXITCODE -eq 0 -and ($out -match [regex]::Escape($version))) {
            Assert-Pass "version output contains tag"
          } else {
            Assert-Fail "version output contains tag" "got: $out"
          }

          # 2. help command
          & $binary help 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) { Assert-Pass "help exit code 0" }
          else { Assert-Fail "help exit code 0" "exit=$LASTEXITCODE" }

          # 3-8. Start proxy and run HTTP checks
          $env:HOST = "127.0.0.1"
          $env:PORT = "18082"
          $env:OPENAI_BASE_URL = "http://localhost:11111/v1"
          $env:OPENAI_API_KEY = "smoke-test-fake-key"
          $proc = Start-Process -FilePath $binary -ArgumentList "-s" -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 2

          try {
            # 3. GET /health
            try {
              $h = Invoke-RestMethod "http://127.0.0.1:18082/health" -TimeoutSec 5
              if ($h.status -eq "ok" -and ($h.version -eq $version -or $h.version -match "^v\d")) {
                Assert-Pass "GET /health returns status=ok"
              } else {
                Assert-Fail "GET /health returns status=ok" "got: $($h | ConvertTo-Json -Compress)"
              }
            } catch { Assert-Fail "GET /health" "$_" }

            # 4. GET / (info endpoint)
            try {
              $info = Invoke-RestMethod "http://127.0.0.1:18082/" -TimeoutSec 5
              Assert-Pass "GET / responds"
            } catch { Assert-Fail "GET / responds" "$_" }

            # 5. POST /v1/messages — invalid JSON → 400
            try {
              Invoke-WebRequest "http://127.0.0.1:18082/v1/messages" -Method POST `
                -Body "not-json" -ContentType "application/json" -TimeoutSec 5 `
                -ErrorAction Stop | Out-Null
              Assert-Fail "POST invalid JSON → 400" "expected 400, got 2xx"
            } catch {
              $code = $_.Exception.Response.StatusCode.value__
              if ($code -eq 400) { Assert-Pass "POST invalid JSON → 400" }
              else { Assert-Fail "POST invalid JSON → 400" "got HTTP $code" }
            }

            # 6. POST /v1/messages — missing model → 400
            $noModel = '{"messages":[{"role":"user","content":"hi"}],"max_tokens":10}'
            try {
              Invoke-WebRequest "http://127.0.0.1:18082/v1/messages" -Method POST `
                -Body $noModel -ContentType "application/json" -TimeoutSec 5 `
                -ErrorAction Stop | Out-Null
              Assert-Fail "POST missing model → 400" "expected 400, got 2xx"
            } catch {
              $code = $_.Exception.Response.StatusCode.value__
              if ($code -eq 400) { Assert-Pass "POST missing model → 400" }
              else { Assert-Fail "POST missing model → 400" "got HTTP $code" }
            }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Remove-Item env:HOST, env:PORT, env:OPENAI_BASE_URL, env:OPENAI_API_KEY -ErrorAction SilentlyContinue
          }

          Write-Host ""
          Write-Host "Smoke tests: $pass passed, $fail failed"
          if ($fail -gt 0) { throw "Smoke tests FAILED ($fail failures)" }

      - name: Zip binaries
        shell: pwsh
        run: |
          $version = $env:VERSION
          foreach ($file in Get-ChildItem dist/*) {
            $zipName = "$($file.BaseName)-${version}.zip"
            Write-Host "Zipping $($file.Name) -> $zipName"
            Compress-Archive -Path $file.FullName -DestinationPath "dist/$zipName"
            Remove-Item $file.FullName
          }
          Get-ChildItem dist/ | Format-Table Name, Length

      - name: Generate checksums
        shell: pwsh
        run: |
          $lines = @()
          foreach ($file in Get-ChildItem dist/*.zip) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            $lines += "$hash  $($file.Name)"
          }
          $lines | Out-File -Encoding utf8 dist/checksums.txt
          Write-Host "--- Checksums ---"
          Get-Content dist/checksums.txt

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $ver = $env:VERSION -replace '^v', ''
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$ver\].*?$\n(.*?)(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)

          if ($match.Success -and $match.Groups[1].Value.Trim()) {
            $notes = $match.Groups[1].Value.Trim()
          } else {
            $notes = "Release $env:VERSION"
          }

          $notes | Out-File -Encoding utf8 release-notes.txt
          Write-Host "--- Release notes ---"
          Get-Content release-notes.txt

      - name: Create release and upload assets
        shell: pwsh
        run: |
          $version = $env:VERSION
          $notes = Get-Content -Path "release-notes.txt" -Raw
          $serverUrl = "${{ github.server_url }}"
          $repo = "${{ github.repository }}"
          $token = "${{ github.token }}"

          $headers = @{
            Authorization = "token $token"
            Accept = "application/json"
          }

          # Create or update release (idempotent — safe for re-runs)
          $body = @{
            tag_name = $version
            name = $version
            body = $notes
          } | ConvertTo-Json -Compress

          $currentSha = (git rev-parse HEAD 2>$null)
          $needUpload = $true

          try {
            $existing = Invoke-RestMethod `
              -Uri "$serverUrl/api/v1/repos/$repo/releases/tags/$version" `
              -Method Get -Headers $headers `
              -SkipCertificateCheck
            $releaseId = $existing.id
            $releaseSha = $existing.target_commitish
            Write-Host "Release $version already exists (id=$releaseId, sha=$releaseSha)"

            # Update release notes
            Invoke-RestMethod `
              -Uri "$serverUrl/api/v1/repos/$repo/releases/$releaseId" `
              -Method Patch -Headers $headers `
              -Body $body -ContentType "application/json" `
              -SkipCertificateCheck | Out-Null

            if ($releaseSha -eq $currentSha) {
              # Same commit — check if assets already exist
              $assets = Invoke-RestMethod `
                -Uri "$serverUrl/api/v1/repos/$repo/releases/$releaseId/assets" `
                -Method Get -Headers $headers `
                -SkipCertificateCheck
              if ($assets.Count -gt 0) {
                Write-Host "Assets already up-to-date ($($assets.Count) files), skipping upload."
                $needUpload = $false
              }
            } else {
              # Tag moved — delete stale assets built from old commit
              Write-Host "Tag moved ($releaseSha -> $currentSha), replacing assets..."
              $assets = Invoke-RestMethod `
                -Uri "$serverUrl/api/v1/repos/$repo/releases/$releaseId/assets" `
                -Method Get -Headers $headers `
                -SkipCertificateCheck
              foreach ($asset in $assets) {
                Write-Host "  Deleting stale: $($asset.name)"
                Invoke-RestMethod `
                  -Uri "$serverUrl/api/v1/repos/$repo/releases/$releaseId/assets/$($asset.id)" `
                  -Method Delete -Headers $headers `
                  -SkipCertificateCheck
              }
            }
            Write-Host "Release updated: id=$releaseId"
          } catch {
            Write-Host "Creating release $version..."
            $release = Invoke-RestMethod `
              -Uri "$serverUrl/api/v1/repos/$repo/releases" `
              -Method Post -Headers $headers `
              -Body $body -ContentType "application/json" `
              -SkipCertificateCheck
            $releaseId = $release.id
            Write-Host "Release created: id=$releaseId"
          }

          # Upload assets (skip if already up-to-date)
          if ($needUpload) {
            foreach ($file in Get-ChildItem -Path "dist/*") {
              Write-Host "Uploading $($file.Name)..."
              $uri = "$serverUrl/api/v1/repos/$repo/releases/$releaseId/assets?name=$($file.Name)"
              Invoke-RestMethod `
                -Uri $uri -Method Post -Headers $headers `
                -InFile $file.FullName `
                -ContentType "application/octet-stream" `
                -SkipCertificateCheck
            }
            Write-Host "All assets uploaded."
          }

      - name: NRT — integration tests
        shell: pwsh
        run: |
          # Skip if no API key configured
          if (-not "${{ secrets.GROQ_API_KEY }}") {
            Write-Host "WARNING: GROQ_API_KEY secret not set — skipping NRT."
            exit 0
          }

          $version = $env:VERSION
          $binary = "dist/cc-api-proxy-windows-amd64.exe"

          # Unzip the Windows binary (was zipped in previous step)
          $zipFile = Get-ChildItem "dist/*windows-amd64*${version}.zip" | Select-Object -First 1
          if (-not $zipFile) { throw "Windows binary zip not found in dist/" }
          $tempDir = New-Item -ItemType Directory -Path "nrt-bin" -Force
          Expand-Archive -Path $zipFile.FullName -DestinationPath $tempDir.FullName
          $binary = (Get-ChildItem "$($tempDir.FullName)/*.exe" | Select-Object -First 1).FullName
          if (-not $binary) { throw "No .exe found after unzip" }

          # Start proxy with Groq free tier — 3 different models per tier
          $env:HOST = "127.0.0.1"
          $env:PORT = "18082"
          $env:OPENAI_BASE_URL = "https://api.groq.com/openai/v1"
          $env:OPENAI_API_KEY = "${{ secrets.GROQ_API_KEY }}"
          $env:ANTHROPIC_DEFAULT_HAIKU_MODEL = "llama-3.1-8b-instant"
          $env:ANTHROPIC_DEFAULT_SONNET_MODEL = "llama-3.3-70b-versatile"
          $env:ANTHROPIC_DEFAULT_OPUS_MODEL = "llama-3.3-70b-versatile"
          $env:PROXY_CACHE_ENABLED = "true"
          $env:PROXY_MAX_IDENTICAL_RETRIES = "3"

          $proc = Start-Process -FilePath $binary -ArgumentList "-s" -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 2

          $pass = 0; $fail = 0
          $base = "http://127.0.0.1:18082"

          function Assert-Pass($label) { Write-Host "  PASS $label"; $script:pass++ }
          function Assert-Fail($label, $detail) { Write-Host "  FAIL $label — $detail"; $script:fail++ }

          function Invoke-Message($model, $content, $extraBody = @{}) {
            $body = @{
              model = $model
              max_tokens = 64
              messages = @(@{ role = "user"; content = $content })
            } + $extraBody
            Invoke-RestMethod "$base/v1/messages" -Method POST `
              -Body ($body | ConvertTo-Json -Depth 10 -Compress) `
              -ContentType "application/json" -TimeoutSec 30
          }

          try {
            # 1. Haiku tier
            try {
              $r = Invoke-Message "claude-haiku-4-5" "Say OK"
              if ($r.content) { Assert-Pass "Haiku (llama-3.1-8b-instant) responds" }
              else { Assert-Fail "Haiku responds" "no content in response" }
            } catch { Assert-Fail "Haiku responds" "$_" }

            # 2. Sonnet tier
            try {
              $r = Invoke-Message "claude-sonnet-4-5" "Say OK"
              if ($r.content) { Assert-Pass "Sonnet (llama-3.3-70b-versatile) responds" }
              else { Assert-Fail "Sonnet responds" "no content in response" }
            } catch { Assert-Fail "Sonnet responds" "$_" }

            # 3. Opus tier
            try {
              $r = Invoke-Message "claude-opus-4-5" "Say OK"
              if ($r.content) { Assert-Pass "Opus (llama-3.3-70b) responds" }
              else { Assert-Fail "Opus responds" "no content in response" }
            } catch { Assert-Fail "Opus responds" "$_" }

            # 4. Tool use
            try {
              $tools = @(@{
                name = "get_weather"
                description = "Get the weather"
                input_schema = @{ type = "object"; properties = @{ location = @{ type = "string" } }; required = @("location") }
              })
              $r = Invoke-Message "claude-opus-4-5" "What is the weather in Paris?" @{ tools = $tools }
              $hasContent = $r.content -and $r.content.Count -gt 0
              if ($hasContent) { Assert-Pass "Tool use — response has content" }
              else { Assert-Fail "Tool use" "no content: $($r | ConvertTo-Json -Compress)" }
            } catch { Assert-Fail "Tool use" "$_" }

            # 5. Streaming SSE
            try {
              $body = @{
                model = "claude-haiku-4-5"
                max_tokens = 32
                stream = $true
                messages = @(@{ role = "user"; content = "Say hi" })
              } | ConvertTo-Json -Depth 10 -Compress

              $req = [System.Net.WebRequest]::Create("$base/v1/messages")
              $req.Method = "POST"
              $req.ContentType = "application/json"
              $req.Timeout = 30000
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
              $req.ContentLength = $bytes.Length
              $stream = $req.GetRequestStream()
              $stream.Write($bytes, 0, $bytes.Length)
              $stream.Close()

              $resp = $req.GetResponse()
              $reader = New-Object System.IO.StreamReader($resp.GetResponseStream())
              $chunk = ""
              $found = $false
              $timeout = [System.Diagnostics.Stopwatch]::StartNew()
              while (-not $reader.EndOfStream -and $timeout.Elapsed.TotalSeconds -lt 15) {
                $line = $reader.ReadLine()
                if ($line -match "message_start|content_block") { $found = $true; break }
              }
              $reader.Close(); $resp.Close()
              if ($found) { Assert-Pass "Streaming SSE contains expected events" }
              else { Assert-Fail "Streaming SSE" "no message_start/content_block event" }
            } catch { Assert-Fail "Streaming SSE" "$_" }

            # 6. Retry loop detection — inject identical tool_use history
            try {
              $toolCall = @{ type = "tool_use"; id = "t1"; name = "bash"; input = @{ command = "ls" } }
              $toolResult = @{ type = "tool_result"; tool_use_id = "t1"; content = "error" }
              $msgs = @(
                @{ role = "user"; content = "run ls" }
                @{ role = "assistant"; content = @($toolCall) }
                @{ role = "user"; content = @($toolResult) }
                @{ role = "assistant"; content = @($toolCall) }
                @{ role = "user"; content = @($toolResult) }
                @{ role = "assistant"; content = @($toolCall) }
                @{ role = "user"; content = @($toolResult) }
                @{ role = "user"; content = "continue" }
              )
              $body = @{
                model = "claude-haiku-4-5"; max_tokens = 64; messages = $msgs
              } | ConvertTo-Json -Depth 10 -Compress
              $r = Invoke-RestMethod "$base/v1/messages" -Method POST `
                -Body $body -ContentType "application/json" -TimeoutSec 30
              if ($r.content) { Assert-Pass "Retry loop detection — proxy responds (nudge injected)" }
              else { Assert-Fail "Retry loop detection" "no content" }
            } catch { Assert-Fail "Retry loop detection" "$_" }

            # 7. Response cache — second identical request returns X-Cache: HIT
            try {
              $cacheBody = @{
                model = "claude-haiku-4-5"; max_tokens = 16
                messages = @(@{ role = "user"; content = "cache test nrt 42" })
              } | ConvertTo-Json -Depth 10 -Compress

              # First request (MISS)
              Invoke-RestMethod "$base/v1/messages" -Method POST `
                -Body $cacheBody -ContentType "application/json" -TimeoutSec 30 | Out-Null

              # Second request (should HIT)
              $resp2 = Invoke-WebRequest "$base/v1/messages" -Method POST `
                -Body $cacheBody -ContentType "application/json" -TimeoutSec 30
              $cacheHeader = $resp2.Headers["X-Cache"]
              if ($cacheHeader -eq "HIT") { Assert-Pass "Response cache returns X-Cache: HIT" }
              else { Assert-Fail "Response cache" "X-Cache=$cacheHeader (expected HIT)" }
            } catch { Assert-Fail "Response cache" "$_" }

          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Remove-Item env:HOST, env:PORT, env:OPENAI_BASE_URL, env:OPENAI_API_KEY `
              -ErrorAction SilentlyContinue
            Remove-Item env:ANTHROPIC_DEFAULT_HAIKU_MODEL, env:ANTHROPIC_DEFAULT_SONNET_MODEL, `
              env:ANTHROPIC_DEFAULT_OPUS_MODEL, env:PROXY_CACHE_ENABLED, `
              env:PROXY_MAX_IDENTICAL_RETRIES -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force "nrt-bin" -ErrorAction SilentlyContinue

            # Notify via Gotify if NRT failed
            if ($script:fail -gt 0 -and "${{ secrets.GOTIFY_TOKEN }}") {
              $body = @{
                title    = "NRT Failed — $version"
                message  = "NRT: $($script:fail)/7 tests failed. Check Gitea Actions."
                priority = 7
              } | ConvertTo-Json -Compress
              try {
                Invoke-RestMethod "http://localhost:8587/message?token=${{ secrets.GOTIFY_TOKEN }}" `
                  -Method POST -ContentType "application/json" -Body $body -TimeoutSec 5
                Write-Host "Gotify notification sent."
              } catch {
                Write-Host "WARNING: Gotify notification failed (non-blocking): $_"
              }
            }

            # Send email if NRT failed
            if ($script:fail -gt 0 -and "${{ secrets.SMTP_USER }}" -and "${{ secrets.SMTP_PASS }}") {
              try {
                $cred = New-Object PSCredential(
                  "${{ secrets.SMTP_USER }}",
                  (ConvertTo-SecureString "${{ secrets.SMTP_PASS }}" -AsPlainText -Force)
                )
                Send-MailMessage `
                  -SmtpServer "smtp.gmail.com" -Port 587 -UseSsl `
                  -From "${{ secrets.SMTP_USER }}" `
                  -To "${{ secrets.SMTP_TO }}" `
                  -Subject "NRT Failed — $version" `
                  -Body "NRT: $($script:fail)/7 tests failed.`n`nCheck Gitea Actions for details." `
                  -Credential $cred
                Write-Host "Email notification sent."
              } catch {
                Write-Host "WARNING: Email notification failed (non-blocking): $_"
              }
            }
          }

          Write-Host ""
          Write-Host "NRT results: $pass passed, $fail failed"
          if ($fail -gt 0) { exit 1 }
