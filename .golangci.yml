# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: false  # Don't analyze test files

linters:
  default: none  # Start with no linters, only enable specific ones
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        - G101  # False positive: endpoint paths are not credentials
        - G304  # Config file paths and package.json reads are trusted
        - G703  # Config file paths from env vars are trusted